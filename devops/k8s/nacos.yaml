apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nacos-pvc
  namespace: nacos
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nacos-standalone
  namespace: nacos
  labels:
    app: nacos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nacos
  template:
    metadata:
      labels:
        app: nacos
    spec:
      containers:
        - name: nacos
          image: nacos/nacos-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8848
            - containerPort: 7848
          env:
            # 单机模式
            - name: MODE
              value: "standalone"
            # JVM 内存，根据节点配置调整
            - name: JVM_XMS
              value: "512m"
            - name: JVM_XMX
              value: "512m"
            - name: JVM_XMN
              value: "256m"
          volumeMounts:
            - name: nacos-data
              mountPath: /home/nacos/data
            - name: nacos-logs
              mountPath: /home/nacos/logs
          # 健康检查
          livenessProbe:
            httpGet:
              path: /nacos/
              port: 8848
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /nacos/
              port: 8848
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: nacos-data
          persistentVolumeClaim:
            claimName: nacos-pvc
        - name: nacos-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nacos-service
  namespace: nacos
spec:
  selector:
    app: nacos
  ports:
    - port: 8848
      targetPort: 8848
      name: web
    - port: 7848
      targetPort: 7848
      name: cluster
  # 访问方式：ClusterIP(集群内) / NodePort(节点访问) / LoadBalancer(云厂商)
  type: NodePort